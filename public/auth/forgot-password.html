<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Action's Odds</title>
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">ACTION'S<span>ODDS</span></div>
      <div class="auth-logo-sub">MLB · NHL · NBA · NFL · GOLF</div>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a link to set a new password.</p>

      <div id="alert" style="display:none;"></div>

      <form id="forgot-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" required autocomplete="email" autofocus>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Send reset link</button>
      </form>

      <div class="auth-link-row">
        Remembered it? <a href="/auth/login.html">Back to log in</a>
      </div>
    </div>

    <div class="footer-link">
      <a href="/">← Back to home</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = window.SUPABASE_URL || 'https://xlfsaxfpdpxsdkovvhxs.supabase.co';
    const SUPABASE_KEY = window.SUPABASE_ANON_KEY || 'sb_publishable_3L81CVKvE9w2agrz6yMe5g_BC4O0pws';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('forgot-form');
    const submitBtn = document.getElementById('submit-btn');
    const alertEl = document.getElementById('alert');

    function showAlert(type, message) {
      alertEl.className = `alert alert-${type}`;
      alertEl.textContent = message;
      alertEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Sending...';

      const email = document.getElementById('email').value.trim().toLowerCase();

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}/auth/reset-password.html`,
        });
        if (error) throw error;

        showAlert('success', `✓ If an account exists for ${email}, a reset link has been sent. Check your inbox.`);
        form.reset();
      } catch (err) {
        // For privacy, we show the same success message even on error
        showAlert('success', `✓ If an account exists for ${email}, a reset link has been sent. Check your inbox.`);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
