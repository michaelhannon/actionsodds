<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Action's Odds</title>
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">ACTION'S<span>ODDS</span></div>
      <div class="auth-logo-sub">MLB · NHL · NBA · NFL · GOLF</div>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-subtitle">Enter your new password below.</p>

      <div id="alert" style="display:none;"></div>

      <form id="reset-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" type="password" id="password" name="password" required autocomplete="new-password" minlength="8" autofocus>
          <div class="helper-text">Minimum 8 characters.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm new password</label>
          <input class="form-input" type="password" id="confirm" name="confirm" required autocomplete="new-password" minlength="8">
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Update password</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = window.SUPABASE_URL || 'https://xlfsaxfpdpxsdkovvhxs.supabase.co';
    const SUPABASE_KEY = window.SUPABASE_ANON_KEY || 'sb_publishable_3L81CVKvE9w2agrz6yMe5g_BC4O0pws';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('reset-form');
    const submitBtn = document.getElementById('submit-btn');
    const alertEl = document.getElementById('alert');

    function showAlert(type, message) {
      alertEl.className = `alert alert-${type}`;
      alertEl.textContent = message;
      alertEl.style.display = 'block';
    }

    // Supabase puts the recovery token in the URL hash; getSession picks it up
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        showAlert('error', 'This reset link is invalid or expired. Please request a new one.');
        submitBtn.disabled = true;
      }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        showAlert('error', 'Passwords do not match.');
        return;
      }
      if (password.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Updating...';

      try {
        const { error } = await supabase.auth.updateUser({ password });
        if (error) throw error;
        showAlert('success', '✓ Password updated. Redirecting to login...');
        setTimeout(() => { window.location.href = '/auth/login.html'; }, 1800);
      } catch (err) {
        showAlert('error', err.message || 'Failed to update password.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update password';
      }
    });
  </script>
</body>
</html>
